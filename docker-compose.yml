services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: toonvault
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - toonvault_net

  toonvault-redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --save 60 1
    volumes:
      - redis_data:/data
    networks:
      - toonvault_net

  mongo:
    image: mongo:6
    restart: always
    volumes:
      - mongo_data:/data/db
    networks:
      - toonvault_net
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    restart: always
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgres://user:password@db:5432/toonvault
      REDIS_URL: redis://toonvault-redis:6379
      PORT: 5000
    depends_on:
      - db
      - toonvault-redis
    networks:
      - toonvault_net


  frontend:
    build: ./frontend
    restart: always
    networks:
      - toonvault_net

  nginx:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "8081:80"
      - "8443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /root/toonvault/uploads:/var/www/uploads:ro
      - certbot_challenge:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    networks:
      - toonvault_net

  graphify:
    build:
      context: .
      dockerfile: Dockerfile.graphify
    restart: always
    volumes:
      - .:/app
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    networks:
      - toonvault_net

networks:
  toonvault_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  mongo_data:
  certbot_challenge:
